:root{
  --bg:#0e2414;--bg2:#18351f;--text:#f6eddc;--line:rgba(246,237,220,.18);--accent:#c98c64;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--bg)}
body{margin:0;min-height:100vh;font-family:Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 10% 0%,rgba(201,140,100,.16),transparent 420px),linear-gradient(180deg,#0d2113,#18351f 45%,#0d2113)}
.nav-wrap{position:sticky;top:0;z-index:20;background:rgba(13,33,19,.86);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.nav{display:flex;gap:8px;overflow-x:auto;padding:12px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav a{flex:0 0 auto;color:var(--text);text-decoration:none;font-size:14px;line-height:1;border:1px solid var(--line);background:rgba(255,255,255,.055);padding:10px 14px;border-radius:999px;white-space:nowrap}
.nav a:hover,.nav a:focus-visible{border-color:rgba(201,140,100,.75);background:rgba(201,140,100,.16);outline:none}
main{width:min(100%,980px);margin:0 auto;padding:16px 10px 44px}
.page{scroll-margin-top:72px;margin:0 auto 16px;border:1px solid var(--line);border-radius:22px;overflow:hidden;background:var(--bg2);box-shadow:0 22px 60px rgba(0,0,0,.34)}
.page img{display:block;width:100%;height:auto;background:#17331e}
.top{position:fixed;right:14px;bottom:14px;z-index:30;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;color:var(--text);text-decoration:none;border:1px solid var(--line);background:rgba(13,33,19,.86);box-shadow:0 14px 34px rgba(0,0,0,.28);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
@media(max-width:640px){.nav{padding:10px 8px}.nav a{font-size:13px;padding:9px 12px}main{padding:10px 6px 34px}.page{border-radius:16px;margin-bottom:10px}}
</style>
